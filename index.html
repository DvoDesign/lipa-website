<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LipaGroup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
@import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background-color: #000000;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
}



.site-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.8rem 3rem;
    font-family: 'Outfit', sans-serif;
}
.logo {
    display: flex;
    flex-direction: column;
    line-height: 1;
}
.logo-main {
    font-family: 'General Sans', -apple-system, sans-serif;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #ffffff;
}
.logo-sub {
    font-size: 0.55rem;
    font-weight: 500;
    letter-spacing: 0.35em;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 3px;
}
.nav-links {
    display: flex;
    gap: 2.4rem;
}
.nav-links a {
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.85);
    text-decoration: none;
    transition: opacity 0.3s ease;
}
.nav-links a:hover {
    opacity: 0.65;
}
.menu-btn {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 9999px;
    padding: 0.55rem 1.2rem;
    font-family: 'Outfit', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #ffffff;
    cursor: pointer;
    transition: all 0.3s ease;
}
.menu-btn:hover {
    border-color: rgba(255, 255, 255, 0.6);
}
.menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 3px);
    grid-template-rows: repeat(3, 3px);
    gap: 2px;
}
.menu-grid span {
    width: 3px;
    height: 3px;
    background-color: #ffffff;
    border-radius: 1px;
}

.hero-content {
    position: fixed;
    top: 50%;
    left: 3rem;
    transform: translateY(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
    width: 100%;
    max-width: 480px;
}

.hero-title {
    font-family: 'General Sans', -apple-system, sans-serif;
    font-size: clamp(1.9rem, 3.6vw, 2.6rem);
    font-weight: 500;
    color: #ffffff;
    line-height: 1.22;
    letter-spacing: -0.02em;
    text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
}

.hero-subtitle {
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 0.02em;
    margin-top: 1.4rem;
    white-space: nowrap;
}
.hero-subtitle .dot {
    margin: 0 0.5rem;
    color: rgba(255, 255, 255, 0.3);
}

.hero-cta {
    margin-top: 2.2rem;
    display: inline-flex;
    align-items: center;
    gap: 1rem;
    background-color: #39FF14;
    color: #000000;
    border: none;
    border-radius: 9999px;
    padding: 0.4rem 0.4rem 0.4rem 1.6rem;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 4px 25px rgba(57, 255, 20, 0.25);
}
.hero-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(57, 255, 20, 0.4);
}
.hero-cta:active {
    transform: translateY(0);
}
.cta-icon {
    width: 2.1rem;
    height: 2.1rem;
    background-color: #000000;
    color: #39FF14;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.scroll-hint {
    position: fixed;
    bottom: 53vh;
    left: 3rem;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-family: 'Outfit', sans-serif;
    font-size: 0.82rem;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.45);
    letter-spacing: 0.02em;
}
.mouse-icon {
    width: 18px;
    height: 28px;
    border: 1.5px solid rgba(255, 255, 255, 0.45);
    border-radius: 9999px;
    display: flex;
    justify-content: center;
    padding-top: 5px;
}
.mouse-wheel {
    width: 3px;
    height: 6px;
    background-color: rgba(255, 255, 255, 0.6);
    border-radius: 9999px;
    animation: mouse-scroll 1.6s infinite ease-in-out;
}
@keyframes mouse-scroll {
    0%   { transform: translateY(0); opacity: 1; }
    60%  { transform: translateY(6px); opacity: 0.3; }
    100% { transform: translateY(0); opacity: 1; }
}

.hero-title .word-inner.accent {
    color: #39FF14;
    text-shadow: 0 0 20px rgba(57, 255, 20, 0.45);
}

.hero-title .word-wrapper {
    display: inline-block;
    overflow: hidden;
    vertical-align: bottom;
    padding-bottom: 0.15em;
    margin-bottom: -0.15em;
}
.hero-title .word-inner {
    display: inline-block;
    opacity: 0;
    transform: translateY(105%);
    filter: blur(20px);
    animation: word-reveal-mask 1.3s cubic-bezier(0.05, 0.9, 0.1, 1) forwards;
}
@keyframes word-reveal-mask {
    0%   { opacity: 0; transform: translateY(105%); filter: blur(20px); }
    30%  { opacity: 1; }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
}

.mask-reveal {
    display: inline-block;
    overflow: hidden;
    vertical-align: bottom;
    padding-bottom: 0.15em;
    margin-bottom: -0.15em;
}
.mask-reveal-inner {
    display: inline-block;
    opacity: 0;
    transform: translateY(105%);
    filter: blur(20px);
    animation: word-reveal-mask 1.3s cubic-bezier(0.05, 0.9, 0.1, 1) forwards;
}
.hero-cta .mask-reveal {
    padding-bottom: 0;
    margin-bottom: 0;
}
.hero-cta .mask-reveal-inner {
    display: inline-flex;
    align-items: center;
    gap: 1rem;
}



.footer-container {
    position: fixed;
    bottom: 24px;
    left: 20px;
    right: 20px;
    width: calc(100vw - 40px);
    z-index: 3;
    display: flex;
    flex-direction: column;
}
.footer-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 100%;
    padding: 0 5px;
}
.footer-title {
    font-family: 'General Sans', -apple-system, sans-serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: #ffffff;
    letter-spacing: -0.015em;
    margin: 0;
}
.footer-title.quote {
    text-transform: none;
}
.footer-divider {
    border: none;
    height: 1px;
    background-color: rgba(255, 255, 255, 0.2);
    margin: 1.6rem 0;
    width: 100%;
}
.footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0 5px;
}
.footer-socials {
    display: flex;
    gap: 1.25rem;
    align-items: center;
    flex: 1;
}
.social-icon {
    color: rgba(255, 255, 255, 0.55);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}
.social-icon:hover {
    color: #ffffff;
    transform: translateY(-2px);
}
.footer-links {
    display: flex;
    gap: 2.8rem;
    justify-content: center;
    align-items: center;
    flex: 2;
}
.footer-link {
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    color: #ffffff;
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: opacity 0.3s ease, transform 0.3s ease;
}
.footer-link:hover {
    opacity: 0.75;
    transform: translateY(-1px);
}
.footer-copyright {
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.45);
    text-align: right;
    flex: 1;
    letter-spacing: 0.02em;
}

.footer-logo-wrap {
    position: fixed;
    bottom: 145px;
    left: 0;
    right: 0;
    width: 100%;
    padding: 0 20px;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3;
    margin: 0;
}
.footer-logo-text {
    font-family: 'General Sans', -apple-system, sans-serif;
    font-size: 21.9vw;
    font-weight: 400;
    color: #ffffff;
    letter-spacing: -0.03em;
    margin-right: -0.03em;
    transform: translateX(-20px);
    line-height: 0.8;
    margin-top: 0;
    margin-bottom: 0;
    margin-left: 0;
    text-align: center;
    width: 100%;
    pointer-events: none;
    opacity: 0.95;
    text-shadow: none;
    white-space: nowrap;
}
.footer-logo-text .letter-wrapper {
    display: inline-block;
    overflow: hidden;
    vertical-align: bottom;
    line-height: 0.8;
}
.footer-logo-text .letter-inner {
    display: inline-block;
    opacity: 0;
    transform: translateX(-105%);
    filter: blur(20px);
    animation: letter-reveal-mask 1.2s cubic-bezier(0.05, 0.9, 0.1, 1) forwards;
}
@keyframes letter-reveal-mask {
    0%   { opacity: 0; transform: translateX(-105%); filter: blur(20px); }
    25%  { opacity: 1; }
    100% { opacity: 0.95; transform: translateX(0); filter: blur(0); }
}

.video-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    z-index: -1;
}
.video-fade-left {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
    background: linear-gradient(to right,
        #000000 0%,
        rgba(0,0,0,0.98) 8%,
        rgba(0,0,0,0.93) 16%,
        rgba(0,0,0,0.85) 24%,
        rgba(0,0,0,0.74) 32%,
        rgba(0,0,0,0.61) 40%,
        rgba(0,0,0,0.48) 48%,
        rgba(0,0,0,0.36) 56%,
        rgba(0,0,0,0.25) 64%,
        rgba(0,0,0,0.15) 72%,
        rgba(0,0,0,0.08) 80%,
        rgba(0,0,0,0.03) 88%,
        rgba(0,0,0,0.01) 94%,
        rgba(0,0,0,0) 100%);
}
#bg-video {
    width: 100%;
    height: 110%;
    object-fit: cover;
    display: block;
    transform: translateY(0%);
}

.glass-cursor-card {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 99999;
    pointer-events: none;
    padding: 0.75rem 1.5rem;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 9999px;
    box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    will-change: transform, opacity;
    transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                background 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                border-color 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.glass-cursor-card.active { opacity: 1; }
.glass-cursor-card.dark-mode {
    background: rgba(0, 0, 0, 0.82);
    border-color: rgba(255, 255, 255, 0.08);
    box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
}
.cursor-card-text {
    font-family: 'General Sans', -apple-system, sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: #39FF14;
    text-transform: uppercase;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(57, 255, 20, 0.45);
}
.cursor-card-text .text-white {
    color: #ffffff;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.25);
}
.cursor-ring-outline {
    position: fixed;
    top: 0;
    left: 0;
    width: 48px;
    height: 48px;
    border: 1.5px solid rgba(255, 255, 255, 0.45);
    border-radius: 50%;
    z-index: 99998;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    will-change: transform, opacity;
    transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                border-color 0.4s ease;
}
.cursor-ring-outline.active { opacity: 1; }
.cursor-ring-outline.expanded {
    border-color: rgba(255, 255, 255, 0.15);
}
</style>
</head>
<body>



<header class="site-header">
    <div class="logo">
        <span class="logo-main">LIPA</span>
        <span class="logo-sub">GROUP</span>
    </div>
    <nav class="nav-links">
        <a href="#">Продукция</a>
        <a href="#">Производство</a>
        <a href="#">Решения</a>
        <a href="#">О компании</a>
        <a href="#">Контакты</a>
    </nav>
    <button class="menu-btn">
        Меню
        <span class="menu-grid">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </span>
    </button>
</header>

<main class="hero-content">
    <h1 class="hero-title">Производство <br> полного цикла <br> для брендов, <br> которым {{важен}} <br> {{результат}}</h1>
    <p class="hero-subtitle"><span class="mask-reveal"><span class="mask-reveal-inner" style="animation-delay: 1.9s;">Полиграфия <span class="dot">•</span> Упаковка <span class="dot">•</span> Швейное производство</span></span></p>
    <button class="hero-cta">
        <span class="mask-reveal"><span class="mask-reveal-inner" style="animation-delay: 2.05s;">
            <span>Начать экскурсию</span>
            <span class="cta-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
            </span>
        </span></span>
    </button>
</main>



<footer class="footer-container">
    <div class="footer-top">
        <h2 class="footer-title">Stay in Touch</h2>
        <h2 class="footer-title quote">Think. Build. Repeat.</h2>
    </div>

    <hr class="footer-divider">

    <div class="footer-bottom">
        <div class="footer-socials">
            <a href="#" aria-label="LinkedIn" class="social-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
            </a>
            <a href="#" aria-label="X" class="social-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16z"></path><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"></path></svg>
            </a>
            <a href="#" aria-label="Instagram" class="social-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            </a>
        </div>



        <div class="footer-copyright">
            © 2026 LipaGroup
        </div>
    </div>
</footer>

<div class="video-container">
    <video autoplay muted playsinline loop id="bg-video">
        <source src="video.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео.
    </video>
</div>
<div class="video-fade-left"></div>

<div id="cursor-ring" class="cursor-ring-outline"></div>

<div id="glass-card" class="glass-cursor-card">
    <span class="cursor-card-text"><span class="text-white">Say</span> Hello!</span>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const logoText = document.querySelector('.footer-logo-text');

    if (logoText) {
        const text = logoText.textContent.trim();
        logoText.innerHTML = '';

        [...text].forEach((char, index) => {
            const wrapper = document.createElement('span');
            wrapper.className = 'letter-wrapper';

            const inner = document.createElement('span');
            inner.textContent = char === ' ' ? ' ' : char;
            inner.className = 'letter-inner';

            inner.style.animationDelay = `${index * 0.09}s`;

            wrapper.appendChild(inner);
            logoText.appendChild(wrapper);
        });
    }

    const heroTitle = document.querySelector('.hero-title');
    if (heroTitle) {
        const text = heroTitle.innerHTML;
        const parts = text.split(/(\s+|<br\s*\/?>)/i);
        heroTitle.innerHTML = '';

        let wordIndex = 0;
        parts.forEach(part => {
            if (part.trim() === '') {
                heroTitle.appendChild(document.createTextNode(' '));
            } else if (part.toLowerCase().startsWith('<br')) {
                heroTitle.appendChild(document.createElement('br'));
            } else {
                const wrapper = document.createElement('span');
                wrapper.className = 'word-wrapper';

                const inner = document.createElement('span');
                inner.className = 'word-inner';

                const accentMatch = part.match(/^\{\{(.+)\}\}$/);
                if (accentMatch) {
                    inner.textContent = accentMatch[1];
                    inner.classList.add('accent');
                } else {
                    inner.textContent = part;
                }

                inner.style.animationDelay = `${wordIndex * 0.1}s`;
                wordIndex++;

                wrapper.appendChild(inner);
                heroTitle.appendChild(wrapper);
            }
        });
    }

    const glassCard = document.getElementById('glass-card');
    const cursorRing = document.getElementById('cursor-ring');

    if (glassCard && cursorRing) {
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        let cardX = mouseX;
        let cardY = mouseY;

        let ringX = mouseX;
        let ringY = mouseY;

        let isFirstMove = true;
        let scale = 0;
        let targetScale = 0;
        let isHoveringBtn = false;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            if (isFirstMove) {
                cardX = mouseX;
                cardY = mouseY;
                ringX = mouseX;
                ringY = mouseY;
                isFirstMove = false;
                glassCard.classList.add('active');
                cursorRing.classList.add('active');
            }

            if (!isHoveringBtn) {
                targetScale = 1;
            }
        });

        document.addEventListener('mouseleave', () => {
            targetScale = 0;
        });

        document.addEventListener('mouseenter', () => {
            if (!isHoveringBtn) {
                targetScale = 1;
            }
        });

        const heroBtn = document.querySelector('.hero-cta');
        if (heroBtn) {
            heroBtn.addEventListener('mouseenter', () => {
                isHoveringBtn = true;
                targetScale = 0;
                cursorRing.classList.add('expanded');
            });
            heroBtn.addEventListener('mouseleave', () => {
                isHoveringBtn = false;
                targetScale = 1;
                cursorRing.classList.remove('expanded');
            });
        }

        const updatePhysics = () => {
            cardX += (mouseX - cardX) * 0.08;
            cardY += (mouseY - cardY) * 0.08;

            ringX = mouseX;
            ringY = mouseY;

            scale += (targetScale - scale) * 0.15;

            const currentRingScale = cursorRing.classList.contains('expanded') ? 1.6 * scale : scale;

            glassCard.style.transform = `translate3d(${cardX}px, ${cardY}px, 0) translate(-50%, -50%) scale(${scale})`;
            cursorRing.style.transform = `translate3d(${ringX}px, ${ringY}px, 0) translate(-50%, -50%) scale(${currentRingScale})`;

            requestAnimationFrame(updatePhysics);
        };

        updatePhysics();
    }
});
</script>

</body>
</html>
